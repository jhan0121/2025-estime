services:
  mysql:
    container_name: estime-mysql
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-blue:
    container_name: estime-api-blue
    image: ${IMAGE_NAME}:${IMAGE_TAG:-latest}
    env_file:
      - ./application/.env.prod
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
    volumes:
      - /app/logs:/app/logs
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  api-green:
    container_name: estime-api-green
    image: ${IMAGE_NAME}:${IMAGE_TAG:-latest}
    env_file:
      - ./application/.env.prod
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
    volumes:
      - /app/logs:/app/logs
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
