name: Flyway Migration Validation (Test)

on:
  pull_request:
    branches:
      [ be/dev, be/prod ]
    paths:
      - 'application/src/main/resources/db/migration/**'
    types:
      [ opened, synchronize, reopened ]

jobs:
  flyway-validation:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpw
          MYSQL_DATABASE: testdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Github Repository 파일 불러오기
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 변경된 Flyway 마이그레이션 파일 목록 탐색
        id: check_changed_files
        run: |
          echo "변경된 Flyway 마이그레이션 파일 목록 탐색 시작..."
          
          git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} -- 'application/src/main/resources/db/migration/**.sql' \
            | grep -E '/(V|R)[0-9_.]+__.*\.sql$' > changed_files.txt

          if [ ! -s changed_files.txt ]; then
            echo "변경된 Flyway 마이그레이션 파일 부재. 정적 분석 종료."
            echo "has_changed_files=false" >> $GITHUB_OUTPUT
          else
            echo "검증 대상 파일:"
            cat changed_files.txt
            echo "has_changed_files=true" >> $GITHUB_OUTPUT
          fi

      - name: SQL 명령어 정적 검사
        id: static_analysis
        if: steps.check_changed_files.outputs.has_changed_files == 'true'
        run: |
          echo "위험 SQL 명령어 검사 시작..."
          echo "정책: '금지' 유형 즉시 실패, '검토' 유형 경고 메시지 출력"

          FORBIDDEN_FOUND=false
          REVIEW_FOUND=false
          ERROR_MESSAGES=()
          WARNING_DETAILS_FILE="warning_details.txt"
          > $WARNING_DETAILS_FILE # Clear the file at the start

          echo "--- '금지' 유형 검사 ---"
          FORBIDDEN_PATTERNS="DROP[[:space:]]+(TABLE|DATABASE|COLUMN)|TRUNCATE[[:space:]]+TABLE"

          if cat $(cat changed_files.txt) | grep -v '^[[:space:]]*--' | grep -qiE "$FORBIDDEN_PATTERNS"; then
            FORBIDDEN_FOUND=true
            MESSAGES=$(cat $(cat changed_files.txt) | grep -v '^[[:space:]]*--' | grep -iE "$FORBIDDEN_PATTERNS" | sed 's#^#- [DROP/TRUNCATE/DROP COLUMN] #')
            ERROR_MESSAGES+=("$MESSAGES")
          fi

          DELETE_NO_WHERE=$(cat $(cat changed_files.txt) | grep -v '^[[:space:]]*--' | grep -iE "DELETE[[:space:]]+FROM" | grep -viE "WHERE" || true)
          if [[ -n "$DELETE_NO_WHERE" ]]; then
            FORBIDDEN_FOUND=true
            MESSAGES=$(echo "$DELETE_NO_WHERE" | sed 's#^#- [DELETE without WHERE] #')
            ERROR_MESSAGES+=("$MESSAGES")
          fi

          echo "--- '검토' 유형 검사 ---"

          SCHEMA_CHANGE_PATTERNS="ALTER[[:space:]]+TABLE.*(RENAME|MODIFY|CHANGE)"
          if cat $(cat changed_files.txt) | grep -v '^[[:space:]]*--' | grep -qiE "$SCHEMA_CHANGE_PATTERNS"; then
            echo "::warning::[검토 필요] 스키마 구조 변경(RENAME, MODIFY, CHANGE) 감지. 애플리케이션 호환성 확인 필요"
            cat $(cat changed_files.txt) | grep -v '^[[:space:]]*--' | grep -iE "$SCHEMA_CHANGE_PATTERNS" | sed 's#^# ⚠️ 검토 | 스키마 구조 변경 | #' >> warning_details.txt
            echo "review_warnings_found=true" >> $GITHUB_OUTPUT
            REVIEW_FOUND=true
          fi

          PERF_LOCK_PATTERNS="ALTER[[:space:]]+TABLE.*(ENGINE|CHARACTER[[:space:]]+SET)|(CREATE|DROP)[[:space:]]+INDEX"
          if cat $(cat changed_files.txt) | grep -v '^[[:space:]]*--' | grep -qiE "$PERF_LOCK_PATTERNS"; then
            echo "::warning::[검토 필요] 인덱스 또는 테이블 속성 변경 감지. 대용량 테이블의 경우 서비스 중단을 유발할 가능성 존재"
            cat $(cat changed_files.txt) | grep -v '^[[:space:]]*--' | grep -iE "$PERF_LOCK_PATTERNS" | sed 's#^# ⚠️ 검토 | 인덱스/테이블 속성 변경 | #' >> warning_details.txt
            echo "review_warnings_found=true" >> $GITHUB_OUTPUT
            REVIEW_FOUND=true
          fi

          DB_LOGIC_PATTERNS="(CREATE|ALTER|DROP)[[:space:]]+VIEW|(ADD|DROP)[[:space:]]+CONSTRAINT"
          if cat $(cat changed_files.txt) | grep -v '^[[:space:]]*--' | grep -qiE "$DB_LOGIC_PATTERNS"; then
            echo "::warning::[검토 필요] DB 제약조건 변경 감지. 숨겨진 부작용 존재 여부 확인 필요"
            cat $(cat changed_files.txt) | grep -v '^[[:space:]]*--' | grep -iE "$DB_LOGIC_PATTERNS" | sed 's#^# ⚠️ 검토 | DB 제약조건 변경 | #' >> warning_details.txt
            echo "review_warnings_found=true" >> $GITHUB_OUTPUT
            REVIEW_FOUND=true
          fi

          DATA_CHANGE_PATTERNS="UPDATE[[:space:]]+\w+[[:space:]]+SET"
          if cat $(cat changed_files.txt) | grep -v '^[[:space:]]*--' | grep -iE "$DATA_CHANGE_PATTERNS" | grep -viE "WHERE"; then
            echo "::warning::[검토 필요] UPDATE 구문 감지. WHERE 절 존재 여부 확인 필요"
            cat $(cat changed_files.txt) | grep -v '^[[:space:]]*--' | grep -iE "$DATA_CHANGE_PATTERNS" | grep -viE "WHERE" | sed 's#^#WARNING | UPDATE WHERE 절 확인 | #' >> warning_details.txt
            echo "review_warnings_found=true" >> $GITHUB_OUTPUT
            REVIEW_FOUND=true
          fi

          # --- 최종 결과 처리 ---
          if [ "$FORBIDDEN_FOUND" = true ]; then
            echo "::error::Flyway 스크립트 내 '금지' 유형 SQL 명령어 감지"
            echo "forbidden_found=true" >> $GITHUB_OUTPUT
          
            printf "%s\n" "${ERROR_MESSAGES[@]}" > forbidden_errors.txt
          
            cat forbidden_errors.txt
            exit 1
          else
            echo "forbidden_found=false" >> $GITHUB_OUTPUT
            if [ "$REVIEW_FOUND" = true ]; then
              echo "Flyway 스크립트 내 '검토' 유형 SQL 명령어 감지"
            else
              echo "위험/검토 명령어 미발견"
            fi
          fi

      - name: Flyway CLI 다운로드
        if: steps.check_changed_files.outputs.has_changed_files == 'true'
        run: |
          echo "Flyway CLI 다운로드 시작..."
          
          wget -q https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/11.8.2/flyway-commandline-11.8.2-linux-x64.tar.gz
          tar -xzf flyway-commandline-11.8.2-linux-x64.tar.gz
          chmod +x flyway-11.8.2/flyway
          
          echo "FLYWAY_PATH=./flyway-11.8.2" >> $GITHUB_ENV
          echo "Flyway CLI 다운로드 완료"

      - name: 테스트 유저 생성
        id: create_user
        if: steps.check_changed_files.outputs.has_changed_files == 'true'
        run: |
          echo "테스트 유저 생성 시작..."
          
          FLYWAY_USER="test_api_user"
          FLYWAY_PASSWORD="test_password"
          
          mysql -h 127.0.0.1 -uroot -ptestpw testdb << EOF
            CREATE USER '${FLYWAY_USER}'@'%' IDENTIFIED BY '${FLYWAY_PASSWORD}';
          
            GRANT SELECT, INSERT, UPDATE, DELETE, CREATE, DROP, ALTER, INDEX, REFERENCES, EXECUTE 
            ON testdb.* TO '${FLYWAY_USER}'@'%';
          
            FLUSH PRIVILEGES;
          
            SHOW GRANTS FOR '${FLYWAY_USER}'@'%';
          EOF
          
          echo "flyway_user=${FLYWAY_USER}" >> $GITHUB_OUTPUT
          echo "flyway_password=${FLYWAY_PASSWORD}" >> $GITHUB_OUTPUT
          
          echo "테스트 유저 생성 완료"

      - name: Flyway CLI 기반 마이그레이션 검증 실행
        id: flyway_migrate
        if: steps.check_changed_files.outputs.has_changed_files == 'true'
        continue-on-error: true
        run: |
          echo "Flyway 마이그레이션 검증 실행 시작..."
          
          if ! ${{ env.FLYWAY_PATH }}/flyway migrate "-url=jdbc:mysql://127.0.0.1:3306/testdb?allowPublicKeyRetrieval=true&useSSL=false" "-user=${{ steps.create_user.outputs.flyway_user }}" "-password=${{ steps.create_user.outputs.flyway_password }}" "-locations=filesystem:application/src/main/resources/db/migration" "-connectRetries=10" > flyway_migration.log 2>&1; then
            echo "마이그레이션 실패"
            echo "--- Flyway Log ---"
            cat flyway_migration.log
            echo "--------------------"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "마이그레이션 성공"
            echo "status=success" >> $GITHUB_OUTPUT
          fi

      - name: 마이그레이션 실패 원인 분석
        if: steps.flyway_migrate.outputs.status == 'failed'
        run: |
          echo "::error::Flyway 마이그레이션 실패"
          echo ""
          echo "==== 실패 원인 분석 ===="
          
          echo -e "## 마이그레이션 실패\n\n" > migration_error.txt
          echo "### 로그 정보" >> migration_error.txt
          echo '```' >> migration_error.txt
          tail -100 flyway_migration.log >> migration_error.txt
          echo '```' >> migration_error.txt

      - name: 마이그레이션 히스토리 확인
        if: steps.flyway_migrate.outputs.status == 'success'
        run: |
          echo "마이그레이션 히스토리 확인 시작..."
          
          mysql -h 127.0.0.1 -u${{ steps.create_user.outputs.flyway_user }} -p${{ steps.create_user.outputs.flyway_password }} testdb << 'EOF'
            SELECT 
              version, 
              description, 
              type, 
              installed_on, 
              success 
            FROM flyway_schema_history 
            ORDER BY installed_rank DESC 
            LIMIT 10;
          EOF

      - name: 검증 결과 코멘트 작성
        if: always()
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.TOKEN }}
          script: |
            const fs = require('fs');
            let report = `# Flyway 마이그레이션 검증 결과
            
            ## 검증 항목
            
            | 검증 유형 | 결과 |
            |----------|------|
            | 위험 SQL 탐색 | ${{ steps.static_analysis.outputs.forbidden_found == 'true' && '❌ 위험' || steps.static_analysis.outputs.review_warnings_found == 'true' && '⚠️ 검토' || '✅ 통과' }} |
            | 마이그레이션 실행 | ${{ steps.flyway_migrate.outputs.status == 'success' && '✅ 성공' || steps.flyway_migrate.outputs.status == 'failed' && '❌ 실패' || '⏭️ 스킵' }} |
            `;
            
            // 위험 SQL 발견 시
            if ('${{ steps.static_analysis.outputs.forbidden_found }}' === 'true' || '${{ steps.static_analysis.outputs.review_warnings_found }}' === 'true') {
              const errorsContent = fs.existsSync('forbidden_errors.txt') 
                ? fs.readFileSync('forbidden_errors.txt', 'utf8') 
                : '';
              const warningsContent = fs.existsSync('warning_details.txt') 
                ? fs.readFileSync('warning_details.txt', 'utf8') 
                : '';

              let header = '## ❌ `위험` 단계 SQL 탐지';
              if ('${{ steps.static_analysis.outputs.forbidden_found }}' !== 'true' && '${{ steps.static_analysis.outputs.review_warnings_found }}' === 'true') {
                header = '## ⚠️ `검토` 단계 SQL 탐지';
              }

              let errorDetails = `
              ${header}
            
              | 위험 레벨 | 사유 | 대상 SQL |
              |:---------|:-----|:----------|
              `;
              if (errorsContent) {
                errorsContent.split('\n').forEach(line => {
                  if (line.trim()) {
                    const match = line.match(/^- \[(.*?)\] (.*)$/);
                    if (match) {
                      const reason = match[1];
                      const query = match[2].replace(/\r/g, '');
                      errorDetails += `| ❌ 위험 | ${reason} | ${query} |\n`;
                    } else {
                      errorDetails += `| ❌ 위험 | 알 수 없음 | ${line} |\n`;
                    }
                  }
                });
              }
              if (warningsContent) {
                warningsContent.split('\n').forEach(line => {
                  if (line.trim()) {
                    const parts = line.split(' | ');
                    if (parts.length === 3) {
                      const riskLevel = parts[0];
                      const reason = parts[1];
                      const query = parts[2].replace(/\r/g, '');
                      errorDetails += `| ${riskLevel} | ${reason} | ${query} |\n`;
                    } else {
                      errorDetails += `| 알 수 없음 | 알 수 없음 | ${line} |\n`;
                    }
                  }
                });
              }
              if (!errorsContent && !warningsContent) {
                errorDetails += `| - | 상세 내용 확인 불가 | - |\n`;
              }
              report += `\n${errorDetails}\n**이러한 SQL은 프로덕션 데이터를 손실시킬 가능성이 매우 높으므로 수정 필요**\n`;
            }
            
            // 마이그레이션 실패 시
            if ('${{ steps.flyway_migrate.outputs.status }}' === 'failed') {
            const fs = require('fs');
            const errorLog = fs.existsSync('migration_error.txt')
            ? fs.readFileSync('migration_error.txt', 'utf8')
              : '상세 로그 확인 불가';
            
            report += `\n${errorLog}\n`;
            }
            
            // 성공 시
            if ('${{ steps.flyway_migrate.outputs.status }}' === 'success') {
              report += `\n## ✅ 검증 성공\n\n모든 마이그레이션 검증 로직 정상 실행\n`;
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: report
            });

      - name: Request changes if validation fail
        if: failure()
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.TOKEN }}
          script: |
            const pull_number = ${{ github.event.pull_request.number }}
            const updated_title = `[FLYWAY 검증 실패] ${{ github.event.pull_request.title }}`

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pull_number,
              title: updated_title
            })

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pull_number,
              event: 'REQUEST_CHANGES',
              body: 'Flyway 마이그레이션 검증 실패'
            })
